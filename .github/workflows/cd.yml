name: SDN CD

on:
  workflow_dispatch:

jobs:
  deploy-lab:
    runs-on: self-hosted
    env:
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t mon-ryu:v2 -f docker/Dockerfile .

      - name: Deploy persistent lab
        run: ansible-playbook ansible/deploy_lab.yml -i ansible/inventory.ini

      - name: Validate persistent lab
        run: sudo -E python3 tests/validate_lab.py
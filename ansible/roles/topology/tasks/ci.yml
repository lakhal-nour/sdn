- name: 🧪 Lancer la topologie de test et exécuter les tests réseau automatisés
  shell: python3 {{ playbook_dir }}/../tests/network_tests.py
  become: yes
  environment:
    PYTHONDONTWRITEBYTECODE: "1"
  register: test_results

- name: 📊 Afficher les résultats des tests CI
  debug:
    msg: "{{ test_results.stdout_lines }}"
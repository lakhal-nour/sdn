- name: Build Docker image
  command: docker build -t mon-ryu:v2 -f docker/Dockerfile .
  args:
    chdir: "{{ playbook_dir }}/.."

- name: Ensure Docker network exists
  shell: docker network create sdn_net || true

- name: Remove existing controller container if exists
  shell: docker rm -f sdn-controller || true

- name: Run SDN controller
  command: >
    docker run -d
    --name sdn-controller
    --network sdn_net
    -p 6633:6633
    -p 8080:8080
    mon-ryu:v2

- name: Wait for REST API port to open
  wait_for:
    host: 127.0.0.1
    port: 8080
    delay: 2
    timeout: 30
- name: Wait for OpenFlow port to open
  wait_for:
    host: 127.0.0.1
    port: 6633
    delay: 2
    timeout: 30
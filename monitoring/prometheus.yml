global:
  scrape_interval: 5s # Fréquence de récupération des données

# 1. Charger les règles d'alertes
rule_files:
  - "prometheus_rules.yml"

# 2. Configurer Alertmanager (le facteur qui envoie les alertes)
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - "alertmanager:9093"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'ryu_exporter'
    static_configs:
      - targets: ['ryu_exporter:8000']
    